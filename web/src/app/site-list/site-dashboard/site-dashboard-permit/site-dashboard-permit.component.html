<div class="permit-detail-container p-3 min-vh-100">
  <div class="back-button d-inline-flex align-items-center gap-2 rounded-pill px-3 py-2 mb-3" role="button" (click)="location.back()">
    <i class="fas fa-arrow-left"></i> 返回
  </div>

  <!-- 載入中狀態 -->
  @if (loading) {
    <div class="d-flex flex-column justify-content-center align-items-center" style="min-height: 300px;">
      <div class="spinner-border text-info mb-3" role="status">
        <span class="visually-hidden">載入中...</span>
      </div>
      <p>正在載入許可單資料...</p>
    </div>
  }

  <!-- 錯誤狀態 -->
  @if (error) {
    <div class="d-flex flex-column justify-content-center align-items-center" style="min-height: 300px;">
      <i class="fas fa-exclamation-triangle text-danger mb-3" style="font-size: 3rem;"></i>
      <p class="fs-5">{{ error }}</p>
    </div>
  }

  <!-- 許可單資料 -->
  @if (!loading && !error) {
    <div class="permit-header mb-4">
      <div>
        <h1 class="fs-3 text-center text-md-start mb-2">{{ site?.projectName }} 許可單統計</h1>
      </div>
      <div class="header-actions d-flex flex-column align-items-center mt-3 gap-3">
        <!-- 日期範圍選擇 -->
        <div>
          <select class="form-select-dark" [(ngModel)]="selectedRange" (change)="onRangeChange()" title="選擇統計時間範圍" aria-label="選擇統計時間範圍">
            <option value="30">最近30天</option>
            <option value="60">最近60天</option>
            <option value="90">最近90天</option>
            <option value="custom">自訂日期範圍</option>
          </select>
        </div>

        <!-- 自訂日期範圍 -->
        @if (selectedRange === 'custom') {
          <div class="custom-date-range d-flex flex-column flex-sm-row gap-2 w-100" style="max-width: 400px;">
            <div class="date-input d-flex flex-column flex-grow-1" style="min-width: 120px;">
              <label class="small text-center mb-1 opacity-75" for="startDate">開始日期</label>
              <input type="date" class="form-control-dark" id="startDate" [(ngModel)]="customStartDate" (change)="onCustomDateChange()" title="選擇開始日期">
            </div>
            <div class="date-input d-flex flex-column flex-grow-1" style="min-width: 120px;">
              <label class="small text-center mb-1 opacity-75" for="endDate">結束日期</label>
              <input type="date" class="form-control-dark" id="endDate" [(ngModel)]="customEndDate" (change)="onCustomDateChange()" title="選擇結束日期">
            </div>
          </div>
        }
      </div>
    </div>

    <!-- 許可單統計圖表 -->
    <div class="mb-3">
      @if (permits.length === 0) {
        <div class="empty-state d-flex flex-column justify-content-center align-items-center rounded-3 p-5" style="min-height: 200px;">
          <i class="fas fa-clipboard-check mb-3" style="font-size: 3rem; opacity: 0.5;"></i>
          <p class="fs-5 opacity-75">暫無許可單資料</p>
        </div>
      } @else {
        <div class="chart-wrapper rounded-3 p-3 position-relative" style="height: 400px;">
          <canvas #permitChart id="permitChart"></canvas>
        </div>
      }
    </div>
  }
</div>
